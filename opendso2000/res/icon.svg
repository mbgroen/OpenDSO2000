<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#222b38"/>
      <stop offset="1" stop-color="#0c1118"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0a141c"/>
      <stop offset="1" stop-color="#06222b"/>
    </linearGradient>
    <linearGradient id="bezel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3a4452"/>
      <stop offset="1" stop-color="#1a212b"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="9" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- app background tile -->
  <rect x="0" y="0" width="1024" height="1024" rx="224" fill="url(#bg)"/>
  <rect x="8" y="8" width="1008" height="1008" rx="218" fill="none"
        stroke="#3a7afe" stroke-opacity="0.35" stroke-width="6"/>

  <!-- scope bezel -->
  <rect x="120" y="190" width="784" height="560" rx="44" fill="url(#bezel)"/>
  <rect x="120" y="190" width="784" height="560" rx="44" fill="none"
        stroke="#0a0e13" stroke-width="6"/>

  <!-- screen -->
  <rect x="168" y="238" width="688" height="464" rx="20" fill="url(#screen)"/>

  <!-- grid -->
  <g stroke="#1f5a63" stroke-width="3" stroke-opacity="0.7">
    <line x1="168" y1="354" x2="856" y2="354"/>
    <line x1="168" y1="470" x2="856" y2="470"/>
    <line x1="168" y1="586" x2="856" y2="586"/>
    <line x1="282" y1="238" x2="282" y2="702"/>
    <line x1="397" y1="238" x2="397" y2="702"/>
    <line x1="512" y1="238" x2="512" y2="702"/>
    <line x1="627" y1="238" x2="627" y2="702"/>
    <line x1="742" y1="238" x2="742" y2="702"/>
  </g>
  <line x1="512" y1="238" x2="512" y2="702" stroke="#2f7e88" stroke-width="4"/>
  <line x1="168" y1="470" x2="856" y2="470" stroke="#2f7e88" stroke-width="4"/>

  <!-- cyan square-ish trace -->
  <polyline points="168,560 280,560 280,420 450,420 450,560 620,560 620,420 790,420 790,560 856,560"
            fill="none" stroke="#13c4f0" stroke-width="10" stroke-opacity="0.85"
            stroke-linejoin="round" stroke-linecap="round"/>

  <!-- yellow sine trace with glow -->
  <path d="M168,470 C 225,300 282,300 339,470 S 453,640 510,470 S 624,300 681,470 S 795,640 856,470"
        fill="none" stroke="#f2d011" stroke-width="14" stroke-linecap="round" filter="url(#glow)"/>

  <!-- knobs row -->
  <g>
    <circle cx="300" cy="838" r="46" fill="url(#bezel)" stroke="#0a0e13" stroke-width="5"/>
    <line x1="300" y1="838" x2="300" y2="804" stroke="#3a7afe" stroke-width="8" stroke-linecap="round"/>
    <circle cx="512" cy="838" r="46" fill="url(#bezel)" stroke="#0a0e13" stroke-width="5"/>
    <line x1="512" y1="838" x2="538" y2="816" stroke="#3a7afe" stroke-width="8" stroke-linecap="round"/>
    <circle cx="724" cy="838" r="46" fill="url(#bezel)" stroke="#0a0e13" stroke-width="5"/>
    <line x1="724" y1="838" x2="700" y2="816" stroke="#f2d011" stroke-width="8" stroke-linecap="round"/>
  </g>
</svg>
