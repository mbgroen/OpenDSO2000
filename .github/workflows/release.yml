name: Release

# Build standalone binaries for every supported platform and publish them on a
# GitHub Release whenever a v* tag is pushed (e.g. v0.1).
on:
  push:
    tags: ["v*"]
  workflow_dispatch:        # allow manual test runs (no release is published)

permissions:
  contents: write

# Run JS actions on Node 24 (silences the Node 20 deprecation warning and
# covers actions that don't yet ship a Node 24 major, e.g. upload-artifact).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest          # Apple Silicon
            label: macOS-arm64
          - os: macos-15-intel          # Intel
            label: macOS-x86_64
          - os: windows-latest
            label: Windows-x64
          - os: ubuntu-latest
            label: Linux-x86_64
            apparch: x86_64
          - os: ubuntu-24.04-arm
            label: Linux-aarch64
            apparch: aarch64
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build (PyInstaller)
        run: pyinstaller --noconfirm packaging/opendso2000.spec

      # ---- package per platform ----
      - name: Package macOS .app (zip)
        if: runner.os == 'macOS'
        run: |
          ditto -c -k --keepParent "dist/OpenDSO2000.app" "OpenDSO2000-${{ matrix.label }}.zip"

      - name: Package Windows .exe
        if: runner.os == 'Windows'
        run: |
          Copy-Item "dist/OpenDSO2000.exe" "OpenDSO2000-${{ matrix.label }}.exe"
        shell: pwsh

      - name: Package Linux AppImage
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libxcb-cursor0 libxcb-xinerama0 libxkbcommon-x11-0 \
            libegl1 libglib2.0-0 libdbus-1-3 fuse || true
          APPDIR=AppDir
          mkdir -p "$APPDIR/usr/bin"
          cp -a dist/OpenDSO2000/. "$APPDIR/usr/bin/"
          cp opendso2000/res/icon_256.png "$APPDIR/opendso2000.png"
          cp opendso2000/res/icon_256.png "$APPDIR/.DirIcon"
          cat > "$APPDIR/opendso2000.desktop" <<'EOF'
          [Desktop Entry]
          Type=Application
          Name=OpenDSO2000
          Exec=OpenDSO2000
          Icon=opendso2000
          Categories=Utility;Education;
          Terminal=false
          EOF
          cat > "$APPDIR/AppRun" <<'EOF'
          #!/bin/sh
          HERE=$(dirname "$(readlink -f "$0")")
          exec "$HERE/usr/bin/OpenDSO2000" "$@"
          EOF
          chmod +x "$APPDIR/AppRun"
          ARCH=${{ matrix.apparch }}
          wget -q "https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-${ARCH}.AppImage" -O appimagetool
          chmod +x appimagetool
          ARCH=${ARCH} ./appimagetool --appimage-extract-and-run "$APPDIR" "OpenDSO2000-${{ matrix.label }}.AppImage"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.label }}
          path: |
            OpenDSO2000-*.zip
            OpenDSO2000-*.exe
            OpenDSO2000-*.AppImage
          if-no-files-found: error

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v5
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -lR artifacts

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
          body: |
            ## OpenDSO2000 ${{ github.ref_name }}

            **Client/server web app.** The downloaded binary is the *server* — it
            connects to the scope over USB and serves a browser UI. Run it on the
            machine attached to the scope (e.g. a Raspberry Pi), then open the
            printed URL in a browser on any device on the network. No Python needed.

            Run the server binary on the scope host:

            | Platform | File |
            |----------|------|
            | macOS (Apple Silicon) | `OpenDSO2000-macOS-arm64.zip` |
            | macOS (Intel) | `OpenDSO2000-macOS-x86_64.zip` |
            | Windows (x64) | `OpenDSO2000-Windows-x64.exe` |
            | Linux (x86-64) | `OpenDSO2000-Linux-x86_64.AppImage` |
            | Linux (ARM64 / Raspberry Pi) | `OpenDSO2000-Linux-aarch64.AppImage` |

            Double-clicking opens the UI locally; from another device browse to
            `http://<server-ip>:8000/`.

            ### Notes
            - **macOS**: unsigned — on first launch right-click → **Open**
              (or `xattr -dr com.apple.quarantine OpenDSO2000.app`).
            - **Windows**: to talk to the scope, bind it to **WinUSB** once with
              [Zadig](https://zadig.akeo.ie/) (USB id `049F:505E`). Simulator works
              without that.
            - **Linux**: `chmod +x` the AppImage; it may need `libfuse2`
              (`sudo apt install libfuse2`) or `--appimage-extract-and-run`.
            - No hardware? Pick a **Simulator** entry in the connect dialog.
            - Set `OPENDSO2000_TOKEN` to require a shared secret for access.
